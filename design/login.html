<title>SquadFire — Entrar</title>
<style>
  /* Login minimalista — card centralizado. Commit deliberado ao tema escuro (forja à noite). */
  :root{
    --ground:#120E0C; --surface:#1D1714; --elevated:#282019; --border:#392E27;
    --text:#F4ECE5; --muted:#AE9E93; --faint:#7A6A5F;
    --accent:#FF6A2B; --accent-bright:#FFB454; --accent-soft:rgba(255,106,43,.13);
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0; height:100%}
  body{
    font-family:var(--sans); color:var(--text); min-height:100vh;
    background:
      radial-gradient(60% 42% at 50% 46%, rgba(255,106,43,.16), transparent 62%),
      radial-gradient(80% 45% at 50% 116%, rgba(255,120,50,.14), transparent 60%),
      #120E0C;
    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  :focus-visible{outline:2px solid var(--accent); outline-offset:3px; border-radius:8px}

  .stage{position:relative; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px}
  #embers{position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none}
  .stage > *{position:relative; z-index:1}

  .card{
    width:100%; max-width:392px; text-align:center; padding:40px 38px 34px;
    background:linear-gradient(180deg, rgba(42,32,25,.55), var(--surface));
    border:1px solid var(--border); border-radius:20px;
    box-shadow:0 1px 0 rgba(255,180,120,.06) inset, 0 24px 60px -22px rgba(0,0,0,.8), 0 0 44px -8px rgba(255,106,43,.14);
  }

  .mark{width:46px; height:46px; filter:drop-shadow(0 0 16px rgba(255,120,50,.6)); margin-bottom:16px}
  .word{font-weight:800; letter-spacing:.16em; font-size:16px; text-transform:uppercase; margin-bottom:30px}
  .word .lit{color:var(--accent)}

  h1{font-size:22px; font-weight:800; letter-spacing:-.01em; margin:0 0 7px}
  .sub{font-size:13.5px; color:var(--muted); margin:0 0 26px; line-height:1.5}

  .gbtn{display:flex; align-items:center; justify-content:center; gap:11px; width:100%; padding:13px 16px; border-radius:12px; cursor:pointer;
    background:#fff; color:#1f1f1f; border:0; font-size:14.5px; font-weight:650; font-family:inherit; transition:.15s; box-shadow:0 10px 28px -12px rgba(255,140,60,.55)}
  .gbtn:hover{transform:translateY(-1px); box-shadow:0 14px 32px -12px rgba(255,140,60,.7)}
  .gbtn:active{transform:translateY(0)}
  .gbtn svg{width:19px; height:19px; flex:0 0 auto}

  .allow{display:inline-flex; align-items:center; gap:7px; margin-top:20px; font-size:12px; color:var(--faint); line-height:1.4}
  .allow svg{width:14px; height:14px; color:var(--accent); flex:0 0 auto; opacity:.85}

  .foot{margin-top:22px; font-size:11.5px; color:var(--faint); text-align:center; line-height:1.6}
  .foot a{color:var(--muted); text-decoration:none; border-bottom:1px solid var(--border)}
  .foot a:hover{color:var(--accent)}

  @media (max-width:480px){ .card{padding:34px 26px 30px} body{overflow:auto} }
  @media (prefers-reduced-motion:reduce){ #embers{display:none} .gbtn:hover{transform:none} }
</style>

<div class="stage">
  <canvas id="embers"></canvas>

  <div class="card">
    <svg class="mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <path d="M16 2c2.5 5-1.5 6.5-1 10 .4 2.8 3.2 3.4 3-.2 2.6 2 3.8 5.2 3.4 8.2C24.6 25.4 20.7 30 16 30 10.6 30 6 25.9 6 20.4c0-4.2 2.6-6.8 3.8-8.7.9 2.7 3.4 2.2 3.3-.6C12.9 7.3 12.4 4.7 16 2z" fill="var(--accent)"/>
      <path d="M16 30c-3 0-5.6-2.3-5.6-5.4 0-2.6 1.9-4 2.8-5.5.6 1.9 2.7 1.6 2.5-.5 2 1.3 3.1 3 3.1 5.3C18.8 27.6 18 30 16 30z" fill="var(--accent-bright)"/>
    </svg>
    <div class="word">Squad<span class="lit">Fire</span></div>

    <h1>Entrar no Covil</h1>
    <p class="sub">Acesse com a sua conta Google da squad.</p>

    <button class="gbtn" id="gbtn">
      <svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.4 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.6c0-1.6-.1-3.1-.4-4.6H24v9.1h12.4c-.5 2.9-2.1 5.3-4.6 6.9l7.1 5.5c4.1-3.8 6.2-9.5 6.2-16z"/><path fill="#FBBC05" d="M10.4 19.4c-.5 1.5-.8 3-.8 4.6s.3 3.1.8 4.6l-7.9 6.1C.9 31.5 0 27.9 0 24s.9-7.5 2.5-10.7l7.9 6.1z"/><path fill="#34A853" d="M24 48c6.4 0 11.8-2.1 15.7-5.8l-7.1-5.5c-2 1.3-4.6 2.1-8.6 2.1-6.3 0-11.7-3.7-13.6-9l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
      Entrar com Google
    </button>

    <div class="allow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l7 4v6c0 4.4-3 7.6-7 10-4-2.4-7-5.6-7-10V6z"/><path d="M9 12l2 2 4-4"/></svg>
      Acesso restrito aos membros da squad · allowlist
    </div>
  </div>

  <div class="foot">© 2026 E3 Digital · Squad 8 · sem acesso? <a href="#">fale com o Admin</a></div>
</div>

<script>
(function(){
  var c=document.getElementById('embers');
  if(!c || (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)) return;
  var ctx=c.getContext('2d'), W, H, parts=[], raf;
  function size(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
  function mk(spread){ return { x:Math.random()*W, y:spread?Math.random()*H:H+8,
    r:.5+Math.random()*1.8, vy:.18+Math.random()*.6, sway:Math.random()*6.28, swaySpd:.006+Math.random()*.016,
    life:0, max:220+Math.random()*260 }; }
  function seed(){ parts=[]; var n=Math.round(Math.min(38, W/34)); for(var i=0;i<n;i++) parts.push(mk(true)); }
  var COLORS=['255,150,60','255,106,43','255,190,110'];
  function draw(){
    ctx.clearRect(0,0,W,H); ctx.globalCompositeOperation='lighter';
    for(var i=0;i<parts.length;i++){ var p=parts[i]; p.life++; p.y-=p.vy; p.sway+=p.swaySpd; p.x+=Math.sin(p.sway)*.3;
      var t=p.life/p.max, a=Math.max(0,(1-t))*(.4+.4*Math.sin(p.life*.14))*.7, col=COLORS[i%COLORS.length];
      var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4);
      g.addColorStop(0,'rgba('+col+','+a+')'); g.addColorStop(1,'rgba('+col+',0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*4,0,6.283); ctx.fill();
      if(p.y< -10 || p.life>p.max) parts[i]=mk(false);
    }
    ctx.globalCompositeOperation='source-over'; raf=requestAnimationFrame(draw);
  }
  size(); seed(); draw();
  var to; window.addEventListener('resize',function(){ clearTimeout(to); to=setTimeout(function(){ cancelAnimationFrame(raf); size(); seed(); draw(); },150); });
  document.getElementById('gbtn').addEventListener('click',function(){ this.style.opacity=.7; this.innerHTML='Entrando…'; });
})();
</script>
