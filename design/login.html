<title>SquadFire — Entrar</title>
<style>
  /* Login "covil do dragão" — preto profundo, faíscas reais + fumaça, fornalha por baixo. */
  :root{
    --ink:#060504; --surface:rgba(15,11,9,.74); --border:rgba(255,120,60,.14);
    --text:#F3E9E2; --muted:#A99889; --faint:#6E5F55;
    --accent:#FF6A2B; --accent-bright:#FFB454;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0; height:100%}
  body{font-family:var(--sans); color:var(--text); min-height:100vh; background:#060504; -webkit-font-smoothing:antialiased; overflow:hidden}
  :focus-visible{outline:2px solid var(--accent); outline-offset:3px; border-radius:8px}

  #smoke,#embers{position:fixed; inset:0; width:100%; height:100%; pointer-events:none}
  #smoke{z-index:0} #embers{z-index:1}
  /* fornalha / leito de brasas por baixo da tela */
  .forge{position:fixed; left:50%; bottom:-20%; width:150%; height:56%; transform:translateX(-50%); z-index:0; pointer-events:none;
    background:
      radial-gradient(38% 100% at 50% 100%, rgba(255,140,50,.55), transparent 66%),
      radial-gradient(62% 100% at 50% 100%, rgba(230,70,28,.32), transparent 72%),
      radial-gradient(90% 100% at 50% 100%, rgba(150,30,12,.22), transparent 78%);
    filter:blur(8px)}
  .vignette{position:fixed; inset:0; z-index:2; pointer-events:none;
    background:
      radial-gradient(118% 88% at 50% 40%, transparent 38%, rgba(0,0,0,.6) 82%, rgba(0,0,0,.9) 100%),
      linear-gradient(180deg, rgba(0,0,0,.65), transparent 24%)}
  @media (prefers-reduced-motion:no-preference){ .forge{animation:flick 4.5s ease-in-out infinite} }
  @keyframes flick{0%,100%{opacity:.92} 38%{opacity:.6} 55%{opacity:.82} 72%{opacity:1}}

  .stage{position:relative; z-index:3; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px}

  .card{
    width:100%; max-width:384px; text-align:center; padding:42px 38px 32px;
    background:var(--surface); backdrop-filter:blur(3px);
    border:1px solid var(--border); border-radius:20px;
    box-shadow:0 0 0 1px rgba(0,0,0,.5), 0 30px 80px -26px rgba(0,0,0,.95), 0 0 60px -14px rgba(255,90,30,.2);
  }
  .logo{display:block; width:auto; height:152px; margin:0 auto 14px; filter:drop-shadow(0 0 26px rgba(255,110,40,.5))}
  @media (prefers-reduced-motion:no-preference){ .logo{animation:logoglow 3.6s ease-in-out infinite} }
  @keyframes logoglow{0%,100%{filter:drop-shadow(0 0 20px rgba(255,110,40,.42))} 50%{filter:drop-shadow(0 0 34px rgba(255,150,70,.72))}}
  .eyebrow{font-size:10px; font-weight:800; letter-spacing:.34em; text-transform:uppercase; color:var(--accent); margin-bottom:24px; text-shadow:0 0 16px rgba(224,58,18,.5)}

  h1{font-size:22px; font-weight:800; letter-spacing:-.01em; margin:0 0 7px}
  .sub{font-size:13.5px; color:var(--muted); margin:0 0 26px; line-height:1.5}

  .gbtn{display:flex; align-items:center; justify-content:center; gap:11px; width:100%; padding:13px 16px; border-radius:12px; cursor:pointer;
    background:#fff; color:#1f1f1f; border:0; font-size:14.5px; font-weight:650; font-family:inherit; transition:.15s; box-shadow:0 10px 30px -12px rgba(255,120,50,.5)}
  .gbtn:hover{transform:translateY(-1px); box-shadow:0 14px 36px -12px rgba(255,140,60,.7)}
  .gbtn:active{transform:translateY(0)}
  .gbtn svg{width:19px; height:19px; flex:0 0 auto}

  .allow{display:inline-flex; align-items:center; gap:7px; margin-top:20px; font-size:12px; color:var(--faint); line-height:1.4}
  .allow svg{width:14px; height:14px; color:var(--accent); flex:0 0 auto; opacity:.85}

  .foot{margin-top:22px; font-size:11.5px; color:var(--faint); text-align:center; line-height:1.6}
  .foot a{color:var(--muted); text-decoration:none; border-bottom:1px solid rgba(255,120,60,.2)}
  .foot a:hover{color:var(--accent)}

  @media (max-width:480px){ .card{padding:36px 26px 28px} body{overflow:auto} }
  @media (prefers-reduced-motion:reduce){ #smoke,#embers{display:none} .gbtn:hover{transform:none} }
</style>

<div class="forge"></div>
<canvas id="smoke"></canvas>
<canvas id="embers"></canvas>
<div class="vignette"></div>

<div class="stage">
  <div class="card">
    <img class="logo" src="assets/squad-shield.png" alt="Squad 8 — CRM da Brigada" />
    <div class="eyebrow">Forjado nas chamas</div>

    <h1>Entrar no Covil</h1>
    <p class="sub">Acesse com a sua conta Google da squad.</p>

    <button class="gbtn" id="gbtn">
      <svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.4 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.6c0-1.6-.1-3.1-.4-4.6H24v9.1h12.4c-.5 2.9-2.1 5.3-4.6 6.9l7.1 5.5c4.1-3.8 6.2-9.5 6.2-16z"/><path fill="#FBBC05" d="M10.4 19.4c-.5 1.5-.8 3-.8 4.6s.3 3.1.8 4.6l-7.9 6.1C.9 31.5 0 27.9 0 24s.9-7.5 2.5-10.7l7.9 6.1z"/><path fill="#34A853" d="M24 48c6.4 0 11.8-2.1 15.7-5.8l-7.1-5.5c-2 1.3-4.6 2.1-8.6 2.1-6.3 0-11.7-3.7-13.6-9l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
      Entrar com Google
    </button>

    <div class="allow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l7 4v6c0 4.4-3 7.6-7 10-4-2.4-7-5.6-7-10V6z"/><path d="M9 12l2 2 4-4"/></svg>
      Acesso restrito aos membros da squad · allowlist
    </div>
  </div>

  <div class="foot">© 2026 E3 Digital · Squad 8 · sem acesso? <a href="#">fale com o Admin</a></div>
</div>

<script>
(function(){
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var sc=document.getElementById('smoke'), ec=document.getElementById('embers');
  var sx=sc.getContext('2d'), ex=ec.getContext('2d'), W, H, smoke=[], sparks=[], raf, frame=0;

  function size(){ W=sc.width=ec.width=window.innerWidth; H=sc.height=ec.height=window.innerHeight; }

  /* ---- fumaça: baforadas quentes, iluminadas de baixo, que sobem e se espalham ---- */
  function mkSmoke(spread){ return {
    x:W*0.5+(Math.random()-0.5)*W*0.85, y:spread?Math.random()*H:H+30,
    r:30+Math.random()*60, grow:0.18+Math.random()*0.4, vy:0.3+Math.random()*0.6,
    ph:Math.random()*6.28, phSpd:0.004+Math.random()*0.01, amp:0.3+Math.random()*0.7,
    life:0, max:320+Math.random()*280, base:0.045+Math.random()*0.05 }; }

  /* ---- brasa real: núcleo quente + rastro; esfria de branco->laranja->vermelho ---- */
  function mkSpark(spread){
    var big=Math.random()<0.14;
    return {
      x:W*0.5+(Math.random()-0.5)*W*(0.35+Math.random()*0.6),
      y:spread?Math.random()*H:H+Math.random()*24,
      px:0, py:0,
      vx:(Math.random()-0.5)*0.5, vy:-(0.9+Math.random()*(big?2.0:3.2)),
      r:(big?1.4:0.5)+Math.random()*1.2,
      ph:Math.random()*6.28, phSpd:0.03+Math.random()*0.06,
      life:0, max:100+Math.random()*(big?220:150), fl:Math.random()*6.28 };
  }

  function seed(){ smoke=[]; sparks=[];
    var ns=Math.round(Math.min(18, W/72)); for(var i=0;i<ns;i++) smoke.push(mkSmoke(true));
    var ne=Math.round(Math.min(120, W/12)); for(var j=0;j<ne;j++) sparks.push(mkSpark(true));
  }

  // rampa de temperatura: 0=branco-quente -> laranja -> vermelho escuro
  var STOPS=[[0,255,249,224],[0.28,255,196,96],[0.58,255,104,34],[1,158,32,12]];
  function heat(t){ for(var i=1;i<STOPS.length;i++){ if(t<=STOPS[i][0]){ var a=STOPS[i-1],b=STOPS[i],f=(t-a[0])/(b[0]-a[0]);
    return Math.round(a[1]+(b[1]-a[1])*f)+','+Math.round(a[2]+(b[2]-a[2])*f)+','+Math.round(a[3]+(b[3]-a[3])*f); } } return '158,32,12'; }

  function draw(){
    frame++;
    /* fumaça */
    sx.clearRect(0,0,W,H); sx.globalCompositeOperation='source-over';
    for(var i=0;i<smoke.length;i++){ var p=smoke[i]; p.life++; p.y-=p.vy; p.r+=p.grow; p.ph+=p.phSpd;
      p.x+=Math.sin(p.ph)*p.amp + Math.sin(p.ph*2.3)*p.amp*0.4;
      var t=p.life/p.max, fade=Math.sin(Math.min(1,t)*Math.PI), hr=Math.max(0,Math.min(1,p.y/H));
      var a=p.base*fade*(0.3+0.7*hr);
      var r=Math.round(64+56*hr), g=Math.round(48+30*hr), bl=Math.round(40+16*hr);
      var gr=sx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
      gr.addColorStop(0,'rgba('+r+','+g+','+bl+','+a+')'); gr.addColorStop(1,'rgba('+r+','+g+','+bl+',0)');
      sx.fillStyle=gr; sx.beginPath(); sx.arc(p.x,p.y,p.r,0,6.283); sx.fill();
      if(p.y<-p.r||p.life>p.max) smoke[i]=mkSmoke(false);
    }
    /* brasas */
    ex.clearRect(0,0,W,H); ex.globalCompositeOperation='lighter'; ex.lineCap='round';
    for(var k=0;k<sparks.length;k++){ var s=sparks[k];
      s.px=s.x; s.py=s.y; s.life++;
      s.vy+=0.006;                              // gravidade puxa: sobe e desacelera
      s.vx+=(Math.random()-0.5)*0.05; s.vx*=0.98;
      s.ph+=s.phSpd;
      s.x+=s.vx+Math.sin(s.ph)*0.25; s.y+=s.vy;
      var t=s.life/s.max, col=heat(t);
      var flick=0.5+0.5*Math.abs(Math.sin(s.fl+frame*0.35));   // cintilância
      var bright=Math.max(0,1-t*t)*flick;
      // rastro (o "risco" da faísca)
      ex.strokeStyle='rgba('+col+','+(bright*0.42)+')'; ex.lineWidth=s.r*0.9;
      ex.beginPath(); ex.moveTo(s.px,s.py); ex.lineTo(s.x,s.y); ex.stroke();
      // núcleo quente + brilho curtinho (não bolha)
      var g2=ex.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*2.2);
      g2.addColorStop(0,'rgba('+col+','+bright+')'); g2.addColorStop(0.5,'rgba('+col+','+(bright*0.5)+')'); g2.addColorStop(1,'rgba('+col+',0)');
      ex.fillStyle=g2; ex.beginPath(); ex.arc(s.x,s.y,s.r*2.2,0,6.283); ex.fill();
      if(s.y<-16||s.life>s.max||s.x<-30||s.x>W+30) sparks[k]=mkSpark(false);
    }
    ex.globalCompositeOperation='source-over';
    raf=requestAnimationFrame(draw);
  }

  size(); seed(); draw();
  var to; window.addEventListener('resize',function(){ clearTimeout(to); to=setTimeout(function(){ cancelAnimationFrame(raf); size(); seed(); draw(); },150); });
  document.getElementById('gbtn').addEventListener('click',function(){ this.style.opacity=.7; this.innerHTML='Entrando…'; });
})();
</script>
