name: CI

on:
  push:
    branches: ['**']
  pull_request:

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  web:
    name: App (typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Testes (mapeamento ClickUp)
        run: npm test
      - name: Build
        run: npm run build

  db:
    name: Banco (migrations · seed · RLS/triggers)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: squadfire_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: squadfire_ci
    steps:
      - uses: actions/checkout@v4
      - name: Instalar psql
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Testes do banco
        run: bash supabase/tests/run.sh
